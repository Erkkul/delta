name: Supabase keepalive

# Ping périodique d'un endpoint Supabase pour éviter la pause Free-tier
# après 7 jours sans activité. Cf. ARCHITECTURE.md §13.3 et tech/setup.md.
#
# Endpoint cible : /auth/v1/health (GoTrue health) — public, pas de clé requise.
# Toute activité sur un service Supabase (Auth, REST, Storage, Realtime)
# remet à zéro le compteur d'inactivité du projet.
#
# Pourquoi pas /rest/v1/ : la nouvelle génération de clés Supabase
# (sb_publishable_* / sb_secret_*) refuse la publishable key sur la racine
# PostgREST avec un 401 "Only secret API keys can be used for this endpoint".
# On garde le ping côté Auth pour rester sans secret.

on:
  schedule:
    # Tous les 3 jours à 03:14 UTC. Marge confortable avant la limite 7 j.
    - cron: "14 3 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    name: Ping Auth health endpoint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Curl /auth/v1/health
        env:
          SUPABASE_URL: https://knyfrnxkqyyirnsyijfk.supabase.co
        run: |
          set -euo pipefail
          code=$(curl -sS -o /tmp/body -w "%{http_code}" \
            "$SUPABASE_URL/auth/v1/health")
          echo "HTTP $code"
          cat /tmp/body
          echo
          if [ "$code" != "200" ]; then
            echo "Unexpected response — expected HTTP 200"
            exit 1
          fi
