name: Supabase keepalive

# Ping périodique de l'API REST Supabase pour éviter la pause Free-tier
# après 7 jours sans activité. Cf. ARCHITECTURE.md §13.3 et tech/setup.md.
#
# Plus simple qu'une connexion psql : un round-trip HTTP touche PostgREST
# qui interroge Postgres, ce qui réinitialise le compteur d'inactivité.

on:
  schedule:
    # Tous les 3 jours à 03:14 UTC. Marge confortable avant la limite 7 j.
    - cron: "14 3 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    name: Ping REST endpoint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Curl /rest/v1/
        env:
          SUPABASE_URL: https://knyfrnxkqyyirnsyijfk.supabase.co
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          code=$(curl -sS -o /tmp/body -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/" \
            -H "apikey: $SUPABASE_PUBLISHABLE_KEY")
          echo "HTTP $code"
          if [ "$code" != "200" ] && [ "$code" != "404" ]; then
            echo "Unexpected response:"
            cat /tmp/body
            exit 1
          fi
